services:
  - type: web
    name: ai-crypto-advisor-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-crypto-advisor-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false

databases:
  - name: ai-crypto-advisor-db
    databaseName: crypto_advisor
    plan: free
